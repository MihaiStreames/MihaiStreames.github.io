<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 256px;
        height: 256px;
        overflow: hidden;
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background: #1e1e2e;
        color: #f5e0dc;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .glyph {
        font-size: 24rem;
        font-weight: 700;
        line-height: 1;
        color: #f5e0dc;
      }
    </style>
  </head>

  <body>
    <div class="glyph">M</div>
  </body>
</html>
